<html>
<head>
    <title>PassManage - Register Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-1200 text-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl border border-gray-800 w-full max-w-md">
        <div class="text-center mb-6">
            <span class="text-4xl">Lock</span>
            <h2 class="text-2xl font-bold text-indigo-400 mt-2">Create Main Account</h2>
            <p class="text-gray-400 text-xs mt-1">Establish your primary database profile</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="bg-white-900/50 border border-black-700 text-green-200 px-4 py-2 rounded mb-4 text-sm text-center">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('register') }}" class="space-y-4">

            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div>
                <label class="block text-xs uppercase tracking-wider font-semibold text-gray-400 mb-1">Master Username</label>
                <input type="text" name="username" required autocomplete="off" 
                       class="w-full bg-gray-700 p-2.5 rounded border border-gray-600 focus:outline-none focus:border-indigo-500 font-medium transition text-gray-100">
            </div>
            <div>
                <label class="block text-xs uppercase tracking-wider font-semibold text-gray-400 mb-1">Master Password</label>
                <input type="password" name="password" required 
                       class="w-full bg-gray-700 p-2.5 rounded border border-gray-600 focus:outline-none focus:border-indigo-500 font-medium transition text-gray-100">
            </div>
            
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 p-3 rounded text-white font-bold transition shadow-lg shadow-indigo-900/40">
                Register Profile
            </button>
        </form>
        
        <div class="mt-6 pt-4 border-t border-gray-700 text-center text-sm">
            <p class="text-gray-400">Already have an active profile? <a href="{{ url_for('login') }}" class="text-indigo-400 hover:underline font-semibold">Unlock vault here</a></p>
        </div>
    </div>
</body>
</html>
